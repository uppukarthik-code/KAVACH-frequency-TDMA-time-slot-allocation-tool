name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frequency-timeslot-analysis
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
        ortools: ["with", "without"]   # exercise CP-SAT path AND the pure-Python fallback
    name: py${{ matrix.python-version }} (${{ matrix.ortools }} ortools)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytest
          if [ "${{ matrix.ortools }}" = "with" ]; then pip install ortools; fi

      - name: Run tests
        run: pytest tests/ -q
